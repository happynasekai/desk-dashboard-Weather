<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%25%22 y=%2250%25%22 font-size=%2280%22 text-anchor=%22middle%22 dominant-baseline=%22central%22>☀️</text></svg>" type="image/svg+xml">
    <meta name="theme-color" content="#121212">
    
    <style>
        /* --- Base & Reset --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #121212; 
            color: #e0e0e0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @media (max-width: 600px) {
            body { overflow: visible !important; }
        }

        /* --- Scaling Container --- */
        #app-container {
            width: 960px;
            height: 1040px;
            min-width: 960px;
            min-height: 1040px;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            gap: 1.2rem; 
            padding: 3rem 4rem; 
            transform-origin: center center;
        }

        /* --- 1. Clock Area --- */
        .clock-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            width: 100%;
        }
        .clock-date {
            font-size: 2.2rem; 
            margin-bottom: 0.5rem;
            letter-spacing: 0.08em;
            font-weight: 500;
            color: #cccccc;
        }
        .clock-time {
            font-family: 'Courier New', Courier, monospace;
            font-size: 7.5rem; 
            font-weight: bold;
            letter-spacing: 0.05em;
            line-height: 1;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        /* --- 2. Weather Hub --- */
        .weather-wrapper {
            width: 100%;
            max-width: 840px; 
            background-color: #1a1a1a;
            padding: 2.0rem 3.5rem; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6); 
            border: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            gap: 1.2rem; 
            transition: opacity 0.4s ease-in-out;
            opacity: 1;
        }
        
        .weather-wrapper.fade-out { opacity: 0; }

        /* [Section A] Today's Weather Overview */
        .today-minimal {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            width: 100%;
            padding-bottom: 1.2rem; 
            border-bottom: 1px solid #333;
        }
        .tm-left {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .tm-desc {
            font-size: 2.6rem; 
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 0.05em;
            line-height: 1.2;
        }
        .tm-meta {
            display: flex;
            align-items: center;
            gap: 2rem;
            font-size: 1.5rem; 
            color: #aaaaaa;
        }
        .tm-meta-loc { color: #dddddd; font-weight: 500; transition: color 0.3s ease; }
        .meta-item { display: flex; align-items: center; gap: 0.5rem; }
        .meta-item svg { fill: currentColor; opacity: 0.8; font-size: 1.3rem; }
        
        .tm-right { text-align: right; }
        .tm-current-temp {
            font-size: 7rem; 
            font-weight: 300;
            line-height: 0.8;
            color: #ffffff;
            letter-spacing: -0.05em;
        }

        /* [Section B] Hourly Forecast (3-Hour Interval) */
        .hourly-forecast {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 0.6rem 0 1.0rem 0; 
            border-bottom: 1px solid #333;
        }
        .hourly-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
        }
        .hr-time { font-size: 1.4rem; font-weight: bold; color: #cccccc; }
        .hr-icon { width: 34px; height: 34px; color: #ffffff; fill: currentColor; } 
        .hr-temp { font-size: 1.6rem; font-weight: bold; color: #ffffff; }
        .hr-rain { font-size: 1.2rem; color: #64b5f6; font-weight: bold; }

        /* [Section C] Weekly Forecast List */
        .forecast-list {
            display: flex;
            flex-direction: column;
            gap: 0.85rem; 
            width: 100%;
            padding-top: 0.3rem;
        }
        
        .forecast-row-min {
            display: grid;
            grid-template-columns: 100px 90px 90px 90px 90px;
            column-gap: 40px;
            align-items: center;
            width: 100%;
            font-size: 1.4rem;
        }
        .fc-date { font-weight: bold; letter-spacing: 0.05em; }
        .fc-desc {
            color: #cccccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .fc-data {
            display: flex;
            align-items: center;
            gap: 0.3em;
            justify-content: flex-end;
        }
        .fc-data span { font-variant-numeric: tabular-nums; }

        .sunday, .holiday { color: #ff5252; }
        .saturday { color: #448aff; }
        .text-high { color: #e0e0e0; }
        .text-low { color: #888888; }
        .text-rain { color: #64b5f6; }

        /* ============================================
           スマホ対応 レスポンシブ (max-width: 600px)
           ============================================ */
        @media (max-width: 600px) {
            body { height: auto; min-height: 100vh; min-height: 100dvh; overflow-y: auto; overflow-x: hidden; align-items: center; padding: 1rem 0 1.2rem 0; }
            #app-container { width: 100%; min-width: unset; height: auto; min-height: unset; padding: 0.6rem 0.8rem 1rem 0.8rem; gap: 0.7rem; transform: none !important; }
            .clock-date { font-size: 1.1rem; margin-bottom: 0.3rem; }
            .clock-time { font-size: 4rem; }
            .weather-wrapper { padding: 1rem 0.9rem; border-radius: 16px; gap: 0.7rem; }
            .today-minimal { flex-direction: row; align-items: center; gap: 0.5rem; padding-bottom: 0.7rem; }
            .tm-left { gap: 0.4rem; flex: 1; min-width: 0; }
            .tm-desc { font-size: 1.3rem; }
            .tm-meta { font-size: 0.85rem; gap: 0.6rem; flex-wrap: wrap; }
            .tm-right { text-align: right; flex-shrink: 0; }
            .tm-current-temp { font-size: 3.5rem; line-height: 1; white-space: nowrap; }
            .hourly-item { gap: 0.5rem; }
            .hr-time { font-size: 1rem; }
            .hr-icon { width: 24px; height: 24px; }
            .hr-temp { font-size: 1.1rem; }
            .hr-rain { font-size: 0.9rem; }
            .forecast-list { gap: 0.6rem; padding-top: 0.2rem; }
            .forecast-row-min { grid-template-columns: 3.6rem 3.6rem auto auto auto; column-gap: 6px; font-size: 0.85rem; }
            .forecast-row-min .fc-desc { display: block; font-size: 0.85rem; min-width: 0; white-space: nowrap; }
            .fc-data svg { height: 0.85em; width: 0.85em; }
            .fc-data { gap: 0.2em; }
        }

        @media (max-width: 360px) {
            .clock-time { font-size: 3.2rem; }
            .tm-current-temp { font-size: 3.2rem; }
            .forecast-row-min { font-size: 0.78rem; column-gap: 4px; grid-template-columns: 3.2rem 3.2rem auto auto auto; }
            .forecast-row-min .fc-desc { font-size: 0.78rem; }
        }
    </style>
</head>
<body>

    <div id="app-container">
        
        <div class="clock-area">
            <div id="clock-date" class="clock-date"></div>
            <div id="clock-time" class="clock-time"></div>
        </div>

        <div id="weather-wrapper" class="weather-wrapper">
            
            <div class="today-minimal">
                <div class="tm-left">
                    <div class="tm-desc" id="cw-desc">--</div>
                    <div class="tm-meta">
                        <span class="tm-meta-loc" id="cw-loc">位置情報取得中...</span>
                        <div class="meta-item text-high">
                            <svg viewBox="0 0 384 512" height="1em" width="1em"><path d="M214.6 41.4c-12.5-12.5-32.8-12.5-45.3 0l-160 160c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L160 141.2 160 448c0 17.7 14.3 32 32 32s32-14.3 32-32l0-306.7L329.4 246.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3l-160-160z"></path></svg>
                            <span id="cw-high">--°</span>
                        </div>
                        <div class="meta-item text-low">
                            <svg viewBox="0 0 384 512" height="1em" width="1em"><path d="M169.4 470.6c12.5 12.5 32.8 12.5 45.3 0l160-160c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L224 370.8 224 64c0-17.7-14.3-32-32-32s-32 14.3-32 32l0 306.7L54.6 265.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3l160 160z"></path></svg>
                            <span id="cw-low">--°</span>
                        </div>
                        <div class="meta-item text-rain">
                            <svg viewBox="0 0 384 512" height="1em" width="1em"><path d="M192 512C86 512 0 426 0 320C0 228.8 130.2 57.7 166.6 11.7C172.6 4.2 181.5 0 191.1 0l1.8 0c9.6 0 18.5 4.2 24.5 11.7C253.8 57.7 384 228.8 384 320c0 106-86 192-192 192zM96 336c0-8.8-7.2-16-16-16s-16 7.2-16 16c0 61.9 50.1 112 112 112c8.8 0 16-7.2 16-16s-7.2-16-16-16c-44.2 0-80-35.8-80-80z"></path></svg>
                            <span id="cw-rain">--%</span>
                        </div>
                    </div>
                </div>
                <div class="tm-right">
                    <div class="tm-current-temp" id="cw-temp">--°</div>
                </div>
            </div>

            <div class="hourly-forecast" id="hourly-forecast"></div>
            <div class="forecast-list" id="forecast-list"></div>

        </div>

    </div>

    <script>
        function fitToScreen() {
            if (window.innerWidth <= 600) {
                document.getElementById('app-container').style.transform = 'none';
                return;
            }
            const baseWidth = 960;
            const baseHeight = 1040;
            const scale = Math.min(window.innerWidth / baseWidth, window.innerHeight / baseHeight);
            document.getElementById('app-container').style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', fitToScreen);
        window.addEventListener('load', fitToScreen);

        function getJapaneseHolidays(year, month) {
            const holidays = {}; 
            const fixed = [{m:0,d:1,n:"元日"},{m:1,d:11,n:"建国記念の日"},{m:1,d:23,n:"天皇誕生日"},{m:3,d:29,n:"昭和の日"},{m:4,d:3,n:"憲法記念日"},{m:4,d:4,n:"みどりの日"},{m:4,d:5,n:"こどもの日"},{m:7,d:11,n:"山の日"},{m:10,d:3,n:"文化の日"},{m:10,d:23,n:"勤労感謝の日"}];
            const happy = [{m:0,n:2,n:"成人の日"},{m:6,n:3,n:"海の日"},{m:8,n:3,n:"敬老の日"},{m:9,n:2,n:"スポーツの日"}];
            function getNthMonday(y,m,n){ const fd=new Date(y,m,1).getDay(); return 1+(8-fd)%7+(n-1)*7; }
            function getEq(y,t){ return Math.floor((t=='spring'?20.8431:23.2488)+0.242194*(y-1980)-Math.floor((y-1980)/4)); }
            
            fixed.forEach(h=>{if(h.m===month)holidays[h.d]=h.n;});
            happy.forEach(h=>{if(h.m===month)holidays[getNthMonday(year,month,h.n)]=h.n;});
            if(month===2)holidays[getEq(year,'spring')]="春分の日";
            if(month===8)holidays[getEq(year,'autumn')]="秋分の日";

            const ld = new Date(year, month+1, 0).getDate();
            for(let d=1;d<=ld;d++){
                if(holidays[d]){
                    const dt=new Date(year,month,d);
                    if(dt.getDay()===0){
                        let nd=d+1; while(holidays[nd]&&nd<=ld)nd++;
                        if(nd<=ld)holidays[nd]="振替休日";
                    }
                }
            }
            for(let d=2;d<ld;d++){
                if(holidays[d-1]&&holidays[d+1]&&!holidays[d]){
                    const dt=new Date(year,month,d); if(dt.getDay()!==0)holidays[d]="国民の休日";
                }
            }
            return holidays;
        }

        function updateClock() {
            const now = new Date();
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            const dateHTML = `${now.getFullYear()}年 ${now.getMonth() + 1}月 ${now.getDate()}日(${days[now.getDay()]})`;
            
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');

            document.getElementById('clock-date').innerHTML = dateHTML;
            document.getElementById('clock-time').textContent = `${h}:${m}:${s}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        const DEFAULT_LAT = 35.5316;
        const DEFAULT_LON = 139.4907;

        let latestHourlyData = null;
        let cachedLocationName = "現在地";
        let isUpdatingAPI = false;

        function getWeatherText(code) {
            const map = {
                0: "快晴", 1: "晴れ", 2: "一部曇り", 3: "曇り",
                45: "霧", 48: "霧",
                51: "霧雨", 53: "霧雨", 55: "霧雨", 56: "霧雨", 57: "霧雨",
                61: "弱い雨", 63: "雨", 65: "強い雨", 66: "雨", 67: "強い雨",
                71: "弱い雪", 73: "雪", 75: "大雪", 77: "雪",
                80: "にわか雨", 81: "にわか雨", 82: "にわか雨",
                85: "にわか雪", 86: "にわか雪",
                95: "雷雨", 96: "雷雨", 99: "雷雨"
            };
            return map[code] || "不明な天気";
        }

        function getSmallIconPath(code) {
            const icons = {
                sun: '<path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0 9c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4zM12 1v2m0 18v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" fill="none"/>',
                cloud: '<path d="M19.36 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.64-4.96z" fill="currentColor"/>',
                rain: '<path d="M19.36 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.64-4.96z" fill="currentColor"/><g stroke="currentColor" stroke-width="3" stroke-linecap="round" fill="none"><line x1="8.5" y1="17" x2="6.5" y2="22"/><line x1="13" y1="17" x2="11" y2="22"/><line x1="17.5" y1="17" x2="15.5" y2="22"/></g>',
                snow: '<path d="M12 2L12 22M2 12L22 12M5 5L19 19M5 19L19 5" stroke="currentColor" stroke-width="2" />',
                thunder: '<path d="M7 14l5-9v5h4l-5 9v-5H7z" fill="currentColor"/>'
            };
            if (code === 0 || code === 1) return icons.sun;
            if (code === 2 || code === 3 || (code >= 45 && code <= 48)) return icons.cloud;
            if ([51, 53, 55, 56, 57, 61, 63, 65, 66, 67, 80, 81, 82].includes(code)) return icons.rain;
            if ([71, 73, 75, 77, 85, 86].includes(code)) return icons.snow;
            if ([95, 96, 99].includes(code)) return icons.thunder;
            return icons.cloud;
        }

        function getGeolocation() {
            return new Promise((resolve, reject) => {
                if ("geolocation" in navigator) {
                    navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 5000, maximumAge: 300000 });
                } else {
                    reject(new Error("Geolocation API非対応"));
                }
            });
        }

        async function fetchWithTimeoutAndRetry(url, retries = 3, delayMs = 2000, timeoutMs = 10000) {
            for (let i = 0; i < retries; i++) {
                try {
                    const controller = new AbortController();
                    const id = setTimeout(() => controller.abort(), timeoutMs);
                    const res = await fetch(url, { signal: controller.signal });
                    clearTimeout(id);
                    if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
                    return res;
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await new Promise(resolve => setTimeout(resolve, delayMs));
                    delayMs *= 2; 
                }
            }
        }

        async function fetchLocationName(lat, lon) {
            const GEOCODE_URL = `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ja`;
            try {
                const res = await fetch(GEOCODE_URL);
                if (!res.ok) return "現在地";
                const data = await res.json();
                return data.city || data.locality || data.principalSubdivision || "現在地";
            } catch (e) { return "現在地"; }
        }

        const svgUp = `<svg viewBox="0 0 384 512" height="1em" width="1em" fill="currentColor"><path d="M214.6 41.4c-12.5-12.5-32.8-12.5-45.3 0l-160 160c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L160 141.2 160 448c0 17.7 14.3 32 32 32s32-14.3 32-32l0-306.7L329.4 246.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3l-160-160z"></path></svg>`;
        const svgDown = `<svg viewBox="0 0 384 512" height="1em" width="1em" fill="currentColor"><path d="M169.4 470.6c12.5 12.5 32.8 12.5 45.3 0l160-160c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L224 370.8 224 64c0-17.7-14.3-32-32-32s-32 14.3-32 32l0 306.7L54.6 265.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3l160 160z"></path></svg>`;
        const svgDrop = `<svg viewBox="0 0 384 512" height="1em" width="1em" fill="currentColor"><path d="M192 512C86 512 0 426 0 320C0 228.8 130.2 57.7 166.6 11.7C172.6 4.2 181.5 0 191.1 0l1.8 0c9.6 0 18.5 4.2 24.5 11.7C253.8 57.7 384 228.8 384 320c0 106-86 192-192 192zM96 336c0-8.8-7.2-16-16-16s-16 7.2-16 16c0 61.9 50.1 112 112 112c8.8 0 16-7.2 16-16s-7.2-16-16-16c-44.2 0-80-35.8-80-80z"></path></svg>`;

        function findCurrentHourlyIndex(hourly) {
            if (!hourly || !Array.isArray(hourly.time)) return 0;
            const now = new Date();
            const slotStartHour = Math.floor(now.getHours() / 3) * 3;
            const slotStart = new Date(now);
            slotStart.setHours(slotStartHour, 0, 0, 0);

            for (let i = 0; i < hourly.time.length; i++) {
                const t = new Date(hourly.time[i]);
                if (t.getTime() === slotStart.getTime()) return i;
            }
            let bestIdx = 0;
            for (let i = 0; i < hourly.time.length; i++) {
                const t = new Date(hourly.time[i]);
                if (t <= now) bestIdx = i;
                else break;
            }
            return bestIdx;
        }

        function handleApiError(message) {
            const locEl = document.getElementById('cw-loc');
            if (locEl) { locEl.textContent = message; locEl.style.color = '#ff5252'; }
            const wrapper = document.getElementById('weather-wrapper');
            if (wrapper) wrapper.classList.remove('fade-out');
        }

        function refreshMainPanelFromHourly() {
            if (!latestHourlyData || isUpdatingAPI) return;
            
            const wrapper = document.getElementById('weather-wrapper');
            if (wrapper) wrapper.classList.add('fade-out');

            setTimeout(() => {
                const idx = findCurrentHourlyIndex(latestHourlyData);
                const code = latestHourlyData.weathercode[idx];
                const temp = Math.round(latestHourlyData.temperature_2m[idx]);
                const rain = latestHourlyData.precipitation_probability[idx];

                const descEl = document.getElementById('cw-desc');
                const tempEl = document.getElementById('cw-temp');
                const rainEl = document.getElementById('cw-rain');
                const locEl = document.getElementById('cw-loc');
                
                if (descEl) descEl.textContent = getWeatherText(code);
                if (tempEl) tempEl.textContent = temp + "°";
                if (rainEl) rainEl.textContent = (rain ?? 0) + "%";
                if (locEl) { locEl.textContent = cachedLocationName; locEl.style.color = '#dddddd'; }

                if (wrapper) wrapper.classList.remove('fade-out');
            }, 400);
        }

        async function updateWeather() {
            isUpdatingAPI = true;
            let lat = DEFAULT_LAT;
            let lon = DEFAULT_LON;

            try {
                const pos = await getGeolocation();
                lat = pos.coords.latitude;
                lon = pos.coords.longitude;
            } catch (err) { console.warn("デフォルト位置を使用します:", err.message); }

            const WEATHER_URL = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=temperature_2m,precipitation_probability,weathercode&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia%2FTokyo&forecast_days=8`;

            try {
                const weatherRes = await fetchWithTimeoutAndRetry(WEATHER_URL);
                
                const [data, locName] = await Promise.all([
                    weatherRes.json(),
                    fetchLocationName(lat, lon)
                ]);

                latestHourlyData = data.hourly;
                cachedLocationName = locName;

                const wrapper = document.getElementById('weather-wrapper');
                if (wrapper) wrapper.classList.add('fade-out');

                setTimeout(() => {
                    const daily0 = { high: Math.round(data.daily.temperature_2m_max[0]), low: Math.round(data.daily.temperature_2m_min[0]) };
                    document.getElementById('cw-high').textContent = daily0.high + "°";
                    document.getElementById('cw-low').textContent = daily0.low + "°";

                    const idx = findCurrentHourlyIndex(latestHourlyData);
                    document.getElementById('cw-desc').textContent = getWeatherText(latestHourlyData.weathercode[idx]);
                    document.getElementById('cw-temp').textContent = Math.round(latestHourlyData.temperature_2m[idx]) + "°";
                    document.getElementById('cw-rain').textContent = (latestHourlyData.precipitation_probability[idx] ?? 0) + "%";
                    
                    const locEl = document.getElementById('cw-loc');
                    locEl.textContent = cachedLocationName;
                    locEl.style.color = '#dddddd';

                    const hourlyContainer = document.getElementById('hourly-forecast');
                    hourlyContainer.innerHTML = '';
                    const now = new Date();
                    now.setMinutes(0, 0, 0); 
                    let itemsAdded = 0;

                    for (let i = 0; i < data.hourly.time.length; i++) {
                        const timeObj = new Date(data.hourly.time[i]);
                        if (timeObj >= now && timeObj.getHours() % 3 === 0) {
                            const hr = timeObj.getHours();
                            const temp = Math.round(data.hourly.temperature_2m[i]);
                            const rain = data.hourly.precipitation_probability[i];
                            const code = data.hourly.weathercode[i];

                            const div = document.createElement('div');
                            div.className = 'hourly-item';
                            div.innerHTML = `
                                <div class="hr-time">${hr}</div>
                                <svg class="hr-icon" viewBox="0 0 24 24">${getSmallIconPath(code)}</svg>
                                <div class="hr-temp">${temp}°</div>
                                <div class="hr-rain">${rain}%</div>
                            `;
                            hourlyContainer.appendChild(div);
                            itemsAdded++;
                            if (itemsAdded >= 7) break; 
                        }
                    }

                    const listContainer = document.getElementById('forecast-list');
                    listContainer.innerHTML = '';
                    const days = ['日', '月', '火', '水', '木', '金', '土'];
                    const baseDate = new Date();

                    for (let i = 1; i <= 7; i++) {
                        const targetDate = new Date();
                        targetDate.setDate(baseDate.getDate() + i);
                        const m = targetDate.getMonth() + 1;
                        const d = targetDate.getDate();
                        const w = targetDate.getDay();
                        const hols = getJapaneseHolidays(targetDate.getFullYear(), targetDate.getMonth());
                        const isHol = hols[d] !== undefined;
                        
                        let dateClass = '';
                        if (w === 0 || isHol) dateClass = 'sunday';
                        else if (w === 6) dateClass = 'saturday';

                        const high = Math.round(data.daily.temperature_2m_max[i]);
                        const low = Math.round(data.daily.temperature_2m_min[i]);
                        const rain = data.daily.precipitation_probability_max[i];
                        const code = data.daily.weathercode[i];

                        const FIG = '\u2007'; 
                        const fmtT = n => `${Math.abs(n) < 10 ? FIG : ''}${n}°`;
                        const fmtR = n => `${n < 10 ? FIG : ''}${n}%`;

                        const row = document.createElement('div');
                        row.className = 'forecast-row-min';
                        row.innerHTML = `
                            <div class="fc-date ${dateClass}">${m}/${d}(${days[w]})</div>
                            <div class="fc-desc">${getWeatherText(code)}</div>
                            <div class="fc-data text-high">${svgUp}<span>${fmtT(high)}</span></div>
                            <div class="fc-data text-low">${svgDown}<span>${fmtT(low)}</span></div>
                            <div class="fc-data text-rain">${svgDrop}<span>${fmtR(rain)}</span></div>
                        `;
                        listContainer.appendChild(row);
                    }
                    if (wrapper) wrapper.classList.remove('fade-out');
                }, 400);

            } catch (e) { 
                console.error(e); 
                handleApiError("データ取得エラー（再試行中...）");
            } finally {
                isUpdatingAPI = false;
            }
        }

        function alignToNextInterval(intervalMinutes) {
            const now = new Date();
            const min = now.getMinutes();
            const sec = now.getSeconds();
            const ms = now.getMilliseconds();
            const minsToNext = intervalMinutes - (min % intervalMinutes);
            let msToNext = (minsToNext * 60 * 1000) - (sec * 1000) - ms;
            if (msToNext <= 0) msToNext += intervalMinutes * 60 * 1000;
            return msToNext;
        }

        function startSyncedIntervals() {
            setTimeout(() => {
                updateWeather();
                setInterval(updateWeather, 30 * 60 * 1000);
            }, alignToNextInterval(30));

            setTimeout(() => {
                refreshMainPanelFromHourly();
                setInterval(refreshMainPanelFromHourly, 5 * 60 * 1000);
            }, alignToNextInterval(5));
        }
        
        updateWeather();
        startSyncedIntervals();
    </script>
</body>
</html>
